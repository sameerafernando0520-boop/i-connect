name: i_connect
description: iFrontiers Connect customer engagement platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management & Utils
  provider: ^6.1.5+1
  intl: ^0.20.2
  uuid: ^4.3.3
  email_validator: ^3.0.0

  # Environment
  flutter_dotenv: ^6.0.1

  # URL Launcher
  url_launcher: ^6.2.1

  # Navigation
  go_router: ^17.2.2

  # Backend & Database
  supabase_flutter: ^2.3.0

  # Firebase
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  firebase_crashlytics: ^5.2.3

  # Image Handling
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7

  # Storage
  shared_preferences: ^2.2.2

  # Sharing
  share_plus: ^13.0.0

  # Charts (Analytics Dashboard)
  fl_chart: ^1.2.0

  # Calendar
  table_calendar: ^3.1.2

  # Fonts
  google_fonts: ^8.1.0

  # Export (v24)
  # NOTE: switched from the `excel` package to pure-CSV generation because the
  # excel pkg's pure-Dart source ballooned the Dart frontend compiler's heap
  # and triggered "zone.cc: 96: error: Out of memory" on low-RAM laptops.
  # CSV opens natively in Excel and ships with zero added deps.
  path_provider: ^2.1.5

  # Offline mode (v24)
  connectivity_plus: ^6.1.0
  record: ^6.2.1
  just_audio: ^0.10.5
  file_picker: ^8.0.0
  geolocator: ^14.0.1
  permission_handler: ^12.0.1
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

# win32 is a Windows-desktop-only transitive, but several plugins export their
# win32 FFI code via `if (dart.library.ffi)` — which is TRUE on Android — so it
# is type-checked during the Android build. file_picker (8/11) is written for
# win32 ^5.x; package_info_plus 10 + share_plus 13 moved to win32 ^6. There is
# no file_picker release on win32 6, so we pin win32 to 5.x and pin
# package_info_plus back to 9.0.1 — the newest release still on win32 ^5.5.3
# (it is only pulled by geolocator_linux). share_plus 13's win32 code still
# compiles against 5.x. No effect on the actual Android/iOS runtime.
dependency_overrides:
  win32: ^5.9.0
  package_info_plus: 9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.3.10

# App Icon — generated from the supplied iConnect app-icon tile
# (navy background + green/white glyph). The tile already includes safe
# padding around the glyph, so no separate adaptive foreground is needed.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/app_icon_logo.png"
  adaptive_icon_background: "#0B1A3B"
  adaptive_icon_foreground: "assets/branding/app_icon_logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

# Native (pre-Flutter) splash — a brief navy screen showing the white iConnect
# lockup, handing off seamlessly to the animated Dart SplashScreen.
# Regenerate with: dart run flutter_native_splash:create
flutter_native_splash:
  # Plain navy native splash (no logo). The OS pre-Flutter splash can't be
  # removed on Android 12+, but a transparent icon + navy background makes it
  # blend seamlessly into the animated Dart SplashScreen — no circle-cropped
  # logo flash on launch.
  color: "#0D2049"
  android_12:
    color: "#0D2049"
    image: assets/branding/transparent.png
  android: true
  ios: true
  web: false

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/branding/